<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LocalKirana — Dukandar Dashboard</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1E8E4A">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --ink: #1C2826;
  --green: #1E8E4A;
  --green-dark: #145C30;
  --green-light: #E8F5E9;
  --amber: #D97706;
  --red: #E6372F;
  --paper: #F4F7F5;
  --card: #FFFFFF;
  --line: #D1E0D7;
  --muted: #6B7280;
  --radius: 16px;
}
* { box-sizing: border-box; }
body {
  margin: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  color: var(--ink); background: var(--paper);
}
header {
  background: linear-gradient(135deg, var(--green-dark), var(--green));
  color: #fff; padding: 18px 20px;
  position: sticky; top: 0; z-index: 10;
  border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
  box-shadow: 0 4px 12px rgba(20, 92, 48, 0.2);
}
.hdr-top { display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 1.1rem; font-weight: 800; margin: 0; }
.badge {
  background: rgba(255,255,255,0.2); border-radius: 20px; padding: 6px 14px;
  font-size: 0.78rem; border: none; color: #fff; font-weight: 600;
}
main { max-width: 520px; margin: 0 auto; padding: 16px; }
.panel {
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 16px; margin-bottom: 14px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.04);
}
.panel h2 { font-size: 1.1rem; margin: 0 0 12px; color: var(--green-dark); font-weight: 800; }

/* Auth Styling */
.phone-box {
  border: 1.5px solid var(--line); border-radius: 10px; padding: 8px 12px;
  display: flex; align-items: center; gap: 10px; position: relative; margin-bottom: 16px;
}
.phone-box .flag-code {
  font-size: 0.95rem; color: var(--ink); white-space: nowrap;
  border-right: 1px solid var(--line); padding-right: 10px; cursor: pointer;
}
.phone-box input { border: none; outline: none; padding: 6px 0; font-size: 0.95rem; flex: 1; }
.floating-label { position: absolute; top: -9px; left: 12px; background: #fff; padding: 0 4px; font-size: 0.72rem; color: var(--muted); }
.country-list { position: absolute; top: 110%; left: 0; background: #fff; border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 6px 18px rgba(0,0,0,0.15); max-height: 200px; overflow-y: auto; width: 240px; z-index: 20; }
.country-list div { padding: 8px 12px; font-size: 0.88rem; cursor: pointer; display: flex; gap: 8px; }
.country-list div:hover { background: var(--green-light); }

/* Buttons */
button {
  border: none; border-radius: 12px; padding: 10px 14px; font-size: 0.9rem;
  font-weight: 700; cursor: pointer; transition: transform .08s ease;
}
button:active { transform: scale(0.97); }
.btn-green { background: linear-gradient(135deg, var(--green), var(--green-dark)); color: #fff; width: 100%; }
.btn-red { background: var(--red); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 0.8rem; }

/* Orders List */
.order-card {
  border: 1px solid var(--line); border-radius: 12px; padding: 14px;
  margin-bottom: 12px; background: #FFF;
}
.order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.order-status {
  padding: 4px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
}
.status-pending { background: #FEF3C7; color: var(--amber); }
.status-accepted { background: var(--green-light); color: var(--green-dark); }
.status-rejected { background: #FEE2E2; color: var(--red); }

.item-list { font-size: 0.88rem; margin: 8px 0; border-top: 1px dashed var(--line); border-bottom: 1px dashed var(--line); padding: 8px 0; }
.item-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
.actions { display: flex; gap: 8px; margin-top: 10px; }

/* Toast */
.toast {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 30px;
  font-size: 0.85rem; z-index: 50; box-shadow: 0 4px 14px rgba(0,0,0,0.25);
}
.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <h1>Dukandar Dashboard 🏪</h1>
    <span class="badge" id="shop-status">Offline</span>
  </div>
</header>

<main>

  <!-- ============ AUTH PANEL ============ -->
  <div id="auth-panel" class="panel">
    <h2>Dukandar Login</h2>

    <div class="phone-box">
      <span class="flag-code" id="country-code-btn" onclick="toggleCountryList()"><img src="https://flagcdn.com/w20/in.png" alt="IN"> +91 ▾</span>
      <label class="floating-label">Mobile Number</label>
      <input type="text" id="phone" placeholder="9876543210" oninput="updateGoogleButtonState()">
      <div id="country-list" class="country-list hidden">
        <input type="text" id="country-search" placeholder="Search country" oninput="renderCountryList(this.value)" style="width:90%;margin:6px auto;display:block;padding:4px;">
        <div id="country-list-items"></div>
      </div>
    </div>

    <p id="phone-hint" style="text-align:center; color:var(--muted); font-size:0.82rem;">Pehle phone number daalein</p>

    <div id="google-btn-wrap" style="opacity:0.4; pointer-events:none;">
      <div id="g_id_onload"
           data-client_id="331552152118-9kbvonm08obtu4fjepnvc46b4lkdjid8.apps.googleusercontent.com"
           data-callback="handleGoogleLogin">
      </div>
      <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="continue_with" data-size="large" data-width="300"></div>
    </div>
  </div>

  <!-- ============ DASHBOARD PANEL ============ -->
  <div id="dashboard-panel" class="panel hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <h2>Naye Orders</h2>
      <button class="btn-green btn-sm" onclick="fetchOrders()" style="width:auto;">Refresh</button>
    </div>

    <div id="orders-container">
      <p style="color:var(--muted); font-size:0.9rem;">Koi naya order nahi hai...</p>
    </div>
  </div>

</main>

<script>
const API = "https://localkirana-production.up.railway.app";
let token = localStorage.getItem('shop_access_token') || null;
let ws = null;

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerText = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ---------------- COUNTRY SELECTOR ----------------
const countries = [
  {flag:"in",code:"+91",name:"India"},
  {flag:"us",code:"+1",name:"USA"},
  {flag:"gb",code:"+44",name:"UK"}
];

function renderCountryList(filter=""){
  const items = document.getElementById('country-list-items');
  const f = filter.toLowerCase();
  const filtered = countries.filter(c => c.name.toLowerCase().includes(f) || c.code.includes(f));
  items.innerHTML = filtered.map(c => `<div onclick="selectCountry('${c.flag}','${c.code}')"><img src="https://flagcdn.com/w20/${c.flag}.png"> ${c.code} ${c.name}</div>`).join('');
}

function toggleCountryList(){
  const list = document.getElementById('country-list');
  list.classList.toggle('hidden');
  if(!list.classList.contains('hidden')) renderCountryList();
}

function selectCountry(flag, code){
  document.getElementById('country-code-btn').innerHTML = `<img src="https://flagcdn.com/w20/${flag}.png"> ${code} ▾`;
  document.getElementById('country-list').classList.add('hidden');
}

// ---------------- AUTH LOGIC ----------------
function updateGoogleButtonState() {
  const phone = document.getElementById('phone').value.trim();
  const valid = /^\d{6,15}$/.test(phone) && !/^(\d)\1+$/.test(phone);
  const wrap = document.getElementById('google-btn-wrap');

  if (valid) {
    wrap.style.opacity = '1';
    wrap.style.pointerEvents = 'auto';
    document.getElementById('phone-hint').innerText = 'Ab Google se continue karein';
  } else {
    wrap.style.opacity = '0.4';
    wrap.style.pointerEvents = 'none';
    document.getElementById('phone-hint').innerText = 'Pehle sahi phone number daalein';
  }
}

async function handleGoogleLogin(response) {
  const phone = document.getElementById('phone').value.trim();
  try {
    const res = await fetch(`${API}/auth/google`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ credential: response.credential, phone: phone, role: "shopkeeper" })
    });
    const data = await res.json();
    if (!res.ok) { toast(data.detail || 'Login fail hua'); return; }

    token = data.access_token;
    localStorage.setItem('shop_access_token', token);
    initDashboard();
  } catch (err) {
    toast('Server Error: Login nahi ho pa raha hai');
  }
}

function authHeaders() {
  return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
}

// ---------------- DASHBOARD & ORDERS ----------------
function initDashboard() {
  document.getElementById('auth-panel').classList.add('hidden');
  document.getElementById('dashboard-panel').classList.remove('hidden');
  document.getElementById('shop-status').innerText = "Online";
  document.getElementById('shop-status').style.background = "rgba(255,255,255,0.4)";
  
  fetchOrders();
  connectWS();
}

async function fetchOrders() {
  try {
    const res = await fetch(`${API}/shopkeeper/orders`, { headers: authHeaders() });
    if (!res.ok) return;
    const orders = await res.json();
    renderOrders(orders);
  } catch(e) {
    toast('Orders fetch nahi ho paaye');
  }
}

function renderOrders(orders) {
  const container = document.getElementById('orders-container');
  if (!orders || orders.length === 0) {
    container.innerHTML = `<p style="color:var(--muted); font-size:0.9rem;">Koi naya order nahi hai...</p>`;
    return;
  }

  container.innerHTML = orders.map(o => `
    <div class="order-card">
      <div class="order-header">
        <strong>Order #${o.id}</strong>
        <span class="order-status status-${o.status.toLowerCase()}">${o.status}</span>
      </div>
      <div class="item-list">
        ${(o.items || []).map(i => `
          <div class="item-row">
            <span>${i.name} x ${i.quantity}</span>
            <span>₹${i.price}</span>
          </div>
        `).join('')}
      </div>
      <div style="display:flex; justify-content:space-between; font-weight:700; margin-bottom:8px;">
        <span>Total:</span>
        <span>₹${o.total_price}</span>
      </div>
      ${o.status === 'PENDING' ? `
        <div class="actions">
          <button class="btn-green" onclick="updateOrderStatus(${o.id}, 'ACCEPTED')">Accept</button>
          <button class="btn-red" onclick="updateOrderStatus(${o.id}, 'REJECTED')">Reject</button>
        </div>
      ` : ''}
    </div>
  `).join('');
}

async function updateOrderStatus(orderId, status) {
  try {
    const res = await fetch(`${API}/shopkeeper/orders/${orderId}/status`, {
      method: 'PUT',
      headers: authHeaders(),
      body: JSON.stringify({ status })
    });
    if (res.ok) {
      toast(`Order #${orderId} ${status.toLowerCase()} ho gaya!`);
      fetchOrders();
    } else {
      toast('Status update fail hua');
    }
  } catch(e) {
    toast('Network Error');
  }
}

// ---------------- WEBSOCKET FOR REALTIME NOTIFICATIONS ----------------
function connectWS() {
  if (!token) return;
  ws = new WebSocket(`wss://localkirana-production.up.railway.app/ws?token=${token}`);
  
  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.type === 'NEW_ORDER') {
      toast('🔔 Naya Order Aaya Hai!');
      fetchOrders();
    }
  };

  ws.onclose = () => {
    setTimeout(connectWS, 5000); // Reconnect logic
  };
}

// Check saved session
window.addEventListener('DOMContentLoaded', () => {
  if (token) {
    initDashboard();
  }
});
</script>

</body>
</html>
