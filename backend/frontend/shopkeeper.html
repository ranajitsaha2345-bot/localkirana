<!DOCTYPE html>
<html lang="en"
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wait — Dukandar</title>
<link rel="manifest" href="/shop-manifest.json" />
<meta name="theme-color" content="#E6372F">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
  .phone-box {
    border: 1.5px solid var(--line); border-radius: 10px; padding: 8px 12px;
    display: flex; align-items: center; gap: 10px; position:relative;
  }
  .phone-box:focus-within{ border-color: var(--red); }
  .phone-box .flag-code {
    font-size: 0.95rem; color: var(--ink); white-space: nowrap;
    border-right: 1px solid var(--line); padding-right: 10px;
  }
  .phone-box input { border: none; outline: none; padding: 6px 0; font-size: 0.95rem; flex: 1; }
  .floating-label{ position:absolute; top:-9px; left:12px; background:#fff; padding:0 4px; font-size:.72rem; color:var(--muted); }
  .phone-box:focus-within .floating-label{ color:var(--red); }

  :root{
    --ink:#2B1810; --red:#E6372F; --red-dark:#B3221D; --orange:#FF8A3D; --pink:#FF5B7F;
    --plum:#5B1A3A; --paper:#FFF3E9; --card:#FFFFFF; --line:#F1DFCF;
    --green-ok:#1E8E4A; --muted:#8A7A6E; --radius:16px;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Segoe UI', system-ui, sans-serif; background:var(--paper); color:var(--ink);}
  h1,h2{font-family:'Poppins','Segoe UI',sans-serif; margin:0;}
  header{
    background: linear-gradient(135deg, var(--plum), var(--red-dark));
    color:#fff; padding:18px 20px 26px; display:flex; justify-content:space-between; align-items:center;
    position:sticky; top:0; z-index:10;
    border-bottom-left-radius:20px; border-bottom-right-radius:20px;
  }
  header h1{font-size:1.05rem; font-weight:800;} header h1 span{color:var(--orange);}
  .badge{background:rgba(255,255,255,.15); border-radius:20px; padding:6px 14px; font-size:.78rem; font-weight:600;}
  .hdr-top{ display:flex; align-items:center; justify-content:space-between; }
  main{max-width:560px; margin:0 auto; padding:16px; padding-top:0;}
  .panel{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px; box-shadow:0 8px 24px rgba(179,34,29,.08);}
  .panel h2{font-size:1rem; margin-bottom:10px; color:var(--red-dark); font-weight:800;}
  input{width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px; font-size:1rem; margin-bottom:10px;}
  input:focus{ outline:none; border-color:var(--red); }
  .pw-wrap{ position:relative; }
  .pw-wrap input{ padding-right:40px; }
  .pw-toggle{
    position:absolute; right:10px; top:50%; transform:translateY(-50%);
    background:none; border:none; padding:0; margin:0; cursor:pointer;
    color:var(--muted); display:flex; align-items:center; justify-content:center;
  }
  .pw-toggle svg{ display:block; width:20px; height:20px; }
  .pw-toggle:active{transform:none;}

  input[type="password"]::-ms-reveal,
  input[type="password"]::-ms-clear { display: none; }
  input::-webkit-credentials-auto-fill-button { visibility: hidden; display: none !important; }
  .pw-toggle{ z-index: 2; }
  .pw-toggle svg{ pointer-events: none; }

  label{font-size:.82rem; color:var(--muted); display:block; margin-bottom:4px;}
  button{border:none; border-radius:12px; padding:12px 16px; font-size:.95rem; font-weight:700; cursor:pointer; transition:transform .08s ease;}
  button:active{transform:scale(.97);}
  .btn-primary{background: linear-gradient(135deg, var(--red), var(--red-dark)); color:#fff; width:100%;}
  .btn-accent{background: linear-gradient(135deg, var(--orange), var(--red)); color:#fff; width:100%;}
  .btn-outline{background:#fff; border:1.5px solid var(--red); color:var(--red-dark);}
  .btn-row{display:flex; gap:8px;}
  .btn-row button{flex:1;}
  .item-check-row{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px dashed var(--line);}
  .item-check-row:last-child{border-bottom:none;}
  .item-check-row .name{flex:1; font-size:.92rem;}
  .add-item-row{ display:flex; align-items:center; gap:6px; }
  .add-item-row{ display:flex; align-items:center; gap:6px; }
.add-item-row input, .add-item-row select{
  margin-bottom:0; padding:10px 8px; font-size:.85rem; min-width:0;
}
.inventory-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap:6px; align-items:stretch; }
.inv-price-badge{ position:absolute; top:4px; left:4px; background:var(--green-ok); color:#fff; font-size:.62rem; font-weight:700; padding:2px 6px; border-radius:6px; z-index:1; }
.inv-remove-x{ position:absolute; top:4px; right:4px; width:20px; height:20px; background:var(--red); color:#fff; border:none; border-radius:50%; font-size:.75rem; font-weight:800; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:2; }
.inv-chip{ background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:20px 4px 6px; text-align:center; display:flex; flex-direction:column; justify-content:space-between; min-height:70px; }
.inv-chip .inv-name{ font-size:.68rem; font-weight:600; display:block; margin-bottom:4px; overflow-wrap:break-word; word-break:break-word; white-space:normal; line-height:1.2; }
.inv-edit-btn{ width:100%; padding:5px 2px; font-size:.68rem; background:#fff; border:1.5px solid var(--red); color:var(--red-dark); border-radius:7px; margin-top:auto; }
.inv-edit-row{ grid-column: 1 / -1; display:flex; align-items:center; gap:6px; background:#fff; border:1px solid var(--line); border-radius:10px; padding:8px; }
.inv-edit-row input, .inv-edit-row select{ margin-bottom:0; padding:8px 6px; font-size:.82rem; min-width:0; }
.ie-name{ flex:1.3; }
.ie-unit{ flex:1; }
.ie-price{ flex:0.8; }
.ie-save{ flex:none; width:auto; padding:8px 12px; white-space:nowrap; }
.ai-name{ flex:1.3; }
.ai-unit{ flex:1; }
.ai-price{ flex:0.7; }
.ai-save{ flex:none; width:auto; padding:10px 14px; white-space:nowrap; }
  .avail-btn{width:42px; height:42px; border-radius:10px; font-size:1.1rem; font-weight:800;}
  .avail-ok{background:#E3F5E9; color:var(--green-ok); border:2px solid var(--green-ok);}
  .avail-no{background:#FBE3DD; color:var(--red); border:2px solid var(--red);}
  .avail-ok.active{background:var(--green-ok); color:#fff;}
  .avail-no.active{background:var(--red); color:#fff;}
  .status-pill{display:inline-block; padding:3px 10px; border-radius:20px; font-size:.72rem; font-weight:700; text-transform:uppercase;}
  .status-pending_shop_review{background:#FFE9D6; color:var(--orange);}
  .status-partially_unavailable{background:#FBE3DD; color:var(--red);}
  .status-awaiting_payment{background:#FFE3EC; color:var(--pink);}
  .status-confirmed{background:#E3F5E9; color:var(--green-ok);}
  .status-ready{background:var(--plum); color:#fff;}
  .status-completed{background:#22281F; color:#fff;}
  .order-card{margin-bottom:14px;}
  .hint{font-size:.78rem; color:var(--muted); margin-top:4px;}
  .hidden{display:none !important;}
  .toast{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:var(--plum); color:#fff; padding:10px 18px; border-radius:30px; font-size:.85rem; z-index:50; box-shadow:0 4px 14px rgba(0,0,0,.25);}
  #qr-reader{width:100%; margin-top:10px;}
  .tabbar{display:flex; gap:8px; margin-bottom:14px;}
  .tabbar button{flex:1; background:#fff; border:1px solid var(--line); color:var(--ink);}
  .tabbar button.active{background: linear-gradient(135deg, var(--red), var(--red-dark)); color:#fff; border-color:var(--red);}
  .auth-heading{ color:var(--ink); font-size:1.25rem; font-weight:800; margin-bottom:14px; }
</style>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  let editingShopItemId = null;

function editInventoryItem(shopItemId, name, price){
  editingShopItemId = shopItemId;
  document.getElementById('new-item-name').value = name;
  document.getElementById('new-item-price').value = price;
  document.querySelector('.ai-save').innerText = 'Update';
  document.getElementById('new-item-name').scrollIntoView({behavior:'smooth', block:'center'});
}
  window.onload = function() {
    google.accounts.id.initialize({
      client_id: "331552152118-9kbvonm08obtu4fjepnvc46b4lkdjid8.apps.googleusercontent.com",
      callback: handleGoogleLogin
    });
    google.accounts.id.renderButton(document.getElementById("g_id_signin"), { theme: "outline", size: "large" });
  };
</script>
</head>
<body>

  <header>
    <div class="hdr-top" style="position:relative; width:100%; display:flex; justify-content:center; align-items:center; min-height:24px;">
      <h1 style="margin:0; font-size:1.05rem; text-align:center;">Wait <span style="color:var(--orange)">🏪</span> · Dukandar</h1>
      <button class="badge" id="user-badge" onclick="skipToGuest()" style="position:absolute; right:0; top:50%; transform:translateY(-50%);">Guest</button>
    </div>
  </header>

<main>
  <div id="auth-panel" class="panel">

    <h2 class="auth-heading" style="margin-bottom:14px;">Enter your number</h2>

    <div class="phone-box" style="margin-bottom: 16px;">
      <span class="flag-code" id="country-code-btn" onclick="toggleCountryList()"><img src="https://flagcdn.com/w20/in.png"> +91 ▾</span>
      <label class="floating-label">Mobile Number</label>
      <div id="phone-error" class="field-error hidden">Please use a real phone number</div>
      <input type="text" id="phone" placeholder=" " oninput="updateGoogleButtonState()">
      <div id="country-list" class="country-list hidden">
        <input type="text" id="country-search" placeholder="Search country" oninput="renderCountryList(this.value)" style="width:92%;margin:6px auto;display:block;padding:6px 8px;border:1px solid var(--line);">
        <div id="country-list-items"></div>
      </div>
    </div>

    <p id="phone-hint" style="text-align:center; color:var(--muted); margin:12px 0; font-size:.85rem;">Enter number, then continue with Google</p>

    <div id="google-btn-wrap" style="opacity:0.4; pointer-events:none;">
      <div id="g_id_onload"
           data-client_id="331552152118-9kbvonm08obtu4fjepnvc46b4lkdjid8.apps.googleusercontent.com"
           data-callback="handleGoogleLogin">
      </div>
      <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="continue_with" data-size="large" data-width="300"></div>
    </div>

  </div>

  <div id="app-content" class="hidden">
    <div class="tabbar">
      <button id="tab-inventory" onclick="switchTab('inventory')">Inventory</button>
      <button id="tab-orders" class="active" onclick="switchTab('orders')">Orders</button>
      <button id="tab-scan" onclick="switchTab('scan')">Pickup Verify</button>
      <button id="tab-myqr" onclick="switchTab('myqr')">Meri Dukan QR</button>
    </div>

    <!-- ORDERS TAB -->
    <div id="tab-content-orders">
      <div id="orders-list"></div>
    </div>

    <!-- INVENTORY TAB -->
    <div id="tab-content-inventory" class="hidden">
      <section class="panel">
        <h2>Add New Item</h2>
        <div class="add-item-row">
          <input id="new-item-name" placeholder="Item name" class="ai-name" />
          <select id="new-item-unit" class="ai-unit">
            <option value="packet">1 Packet</option>
            <option value="kg">1 Kg</option>
            <option value="litre">1 Litre</option>
          </select>
          <input id="new-item-price" type="number" step="0.5" placeholder="₹" class="ai-price" />
          <button class="btn-accent ai-save" onclick="createItem()">Save</button>
        </div>
      </section>
      <section class="panel">
        <h2>Shop Item List</h2>
        <div id="inventory-list" class="inventory-grid"></div>
      </section>
    </div>

    <!-- SCAN TAB -->
    <div id="tab-content-scan" class="hidden">
      <section class="panel">
        <h2>Confirm Pickup</h2>

        <label>Code Given by Customer</label>
        <input id="code-input" maxlength="4" placeholder="1234" />

        <button class="btn-accent" style="margin-top:10px;" onclick="verifyByCode()">Verify with Code</button>
      </section>
    </div>

    <!-- MY SHOP QR TAB -->
    <div id="tab-content-myqr" class="hidden">
      <section class="panel">
        <h2>My Shop QR</h2>
        <div class="hint" style="margin-bottom:10px;">
          Print this or keep it on screen at your shop. When a customer scans it, you'll instantly get their order details.
        </div>
        <div id="my-qr-box" style="text-align:center; padding:16px;"></div>
        <div id="my-qr-name" class="hint" style="text-align:center; font-weight:700; font-size:1rem; color:var(--red-dark);"></div>
      </section>
    </div>
  </div>
</main>

<script>
const API = "https://localkirana-production.up.railway.app";
let token = null, myUserId = null, ws = null;
let isSignupMode = false;

function togglePasswordVisibility(){
  const pw = document.getElementById('password');
  const willShow = pw.type === 'password';
  pw.type = willShow ? 'text' : 'password';
  document.getElementById('pw-toggle-icon').innerHTML = willShow
    ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>'
    : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
}

function toggleAuthMode(){
  isSignupMode = !isSignupMode;
  document.getElementById('signup-extra-fields').classList.toggle('hidden', !isSignupMode);
  document.getElementById('auth-title').innerText = isSignupMode ? 'Naya Account Banao' : 'Login Karo';
  document.getElementById('auth-main-btn').innerText = isSignupMode ? 'Naya Account (Signup)' : 'Login';
  document.getElementById('auth-main-btn').setAttribute('onclick', isSignupMode ? 'signup()' : 'login()');
  document.getElementById('toggle-text').innerText = isSignupMode ? 'Pehle se account hai? ' : 'Naya account nahi hai? ';
  document.getElementById('toggle-link').innerText = isSignupMode ? 'Login Karo' : 'Naya Account Banao';
}

function getShopLocation(callback){
  if(!navigator.geolocation){
    toast('Location support nahi hai is browser mein');
    callback(0, 0);
    return;
  }
  navigator.geolocation.getCurrentPosition(
    (position) => {
      callback(position.coords.latitude, position.coords.longitude);
    },
    (error) => {
      toast('Please allow location to sign up');
      console.error('Geolocation error:', error);
    }
  );
}

async function signup(){
  getShopLocation(async (lat, lng) => {
    const body = {
      name: document.getElementById('reg-name').value,
      phone: document.getElementById('phone').value,
      email: document.getElementById('reg-email').value,
      password: document.getElementById('password').value,
      role: "shopkeeper",
      shop_name: document.getElementById('shop-name').value,
      shop_address: document.getElementById('shop-address').value,
      shop_latitude: lat, shop_longitude: lng
    };
    const res = await fetch(`${API}/auth/signup`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
    if(!res.ok){ toast('Signup failed: ' + (await res.text())); return; }
    onLoggedIn(await res.json());
  });
}

async function requestOtp(){
  const phone = document.getElementById('phone').value.trim();
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  if(!phone){ toast('Enter phone number'); return; }
  if(!email){ toast('Gmail is required'); return; }
  navigator.geolocation.getCurrentPosition(async (pos) => {
    await sendOtpRequest(phone, name, email, pos.coords.latitude, pos.coords.longitude);
  }, async () => {
    await sendOtpRequest(phone, name, email, 0, 0);
  });
}

async function sendOtpRequest(phone, name, email, lat, lng){
  const res = await fetch(`${API}/auth/request-otp`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({phone, name, email, role:'shopkeeper', latitude:lat, longitude:lng})
  });
  const data = await res.json();
  if(!res.ok){ toast(data.detail || 'Something went wrong'); return; }
  toast('OTP sent to your Gmail');
  document.getElementById('otp-box').classList.remove('hidden');
}

async function verifyOtp(){
  const phone = document.getElementById('phone').value.trim();
  const otp = document.getElementById('login-otp').value.trim();
  const res = await fetch(`${API}/auth/verify-login-otp`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({phone, otp})
  });
  const data = await res.json();
  if(!res.ok){ toast(data.detail || 'Invalid OTP'); return; }
  onLoggedIn(data);
}

let lastInvalidToastPhone = '';
function updateGoogleButtonState(){
  const phone = document.getElementById('phone').value.trim();
  const validPhone = /^\d{6,15}$/.test(phone) && !/^(\d)\1+$/.test(phone);
  const wrap = document.getElementById('google-btn-wrap');
  const phoneBox = document.querySelector('.phone-box');
  const label = document.querySelector('.floating-label');
  const hint = document.getElementById('phone-hint');

  if(validPhone){
    wrap.style.opacity = '1';
    wrap.style.pointerEvents = 'auto';
    hint.innerText = 'Now continue with Google';
    phoneBox.style.borderColor = 'var(--green-ok)';
    label.style.color = 'var(--green-ok)';
    lastInvalidToastPhone = '';
  } else {
    wrap.style.opacity = '0.4';
    wrap.style.pointerEvents = 'none';
    hint.innerText = 'Enter number, then continue with Google';
    phoneBox.style.borderColor = '';
    label.style.color = '';
    if(phone.length >= 6 && phone !== lastInvalidToastPhone){
      toast('Enter valid number');
      lastInvalidToastPhone = phone;
    }
  }
}

async function handleGoogleLogin(response){
  const phone = document.getElementById('phone').value.trim();
  const validPhone = /^\d{6,15}$/.test(phone) && !/^(\d)\1+$/.test(phone);
  if(!validPhone){ toast('Enter a valid phone number'); return; }
  navigator.geolocation.getCurrentPosition(async (pos) => {
    await sendGoogleLogin(response.credential, phone, pos.coords.latitude, pos.coords.longitude);
  }, async () => {
    await sendGoogleLogin(response.credential, phone, 0, 0);
  });
}

async function sendGoogleLogin(credential, phone, lat, lng){
  const res = await fetch(`${API}/auth/google`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({credential, phone, role:'shopkeeper', latitude:lat, longitude:lng})
  });
  const data = await res.json();
  if(!res.ok){ toast(data.detail || 'Google login failed'); return; }
  onLoggedIn(data);
}

function onLoggedIn(data){
  token = data.access_token; myUserId = data.user_id;
  document.getElementById('user-badge').innerText = data.name;
  document.getElementById('auth-panel').classList.add('hidden');
  document.getElementById('app-content').classList.remove('hidden');
  loadOrders(); loadCatalogAndInventory(); connectWS();
  setInterval(loadOrders, 8000);
}

function openForgotPassword(){
  document.getElementById('forgot-modal').classList.remove('hidden');
  document.getElementById('forgot-step1').classList.remove('hidden');
  document.getElementById('forgot-step2').classList.add('hidden');
}

function closeForgotPassword(){
  document.getElementById('forgot-modal').classList.add('hidden');
  document.getElementById('forgot-phone').value = '';
  document.getElementById('forgot-otp').value = '';
  document.getElementById('forgot-new-password').value = '';
}

async function sendForgotOtp(){
  const phone = document.getElementById('forgot-phone').value;
  if(!phone){ toast('Phone number daalo'); return; }
  const res = await fetch(`${API}/auth/forgot-password`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({phone})
  });
  const data = await res.json();
  if(!res.ok){ toast(data.detail || 'Kuch galat ho gaya'); return; }
  toast('OTP Gmail par bhej diya gaya hai');
  document.getElementById('forgot-step1').classList.add('hidden');
  document.getElementById('forgot-step2').classList.remove('hidden');
}

async function submitResetPassword(){
  const phone = document.getElementById('forgot-phone').value;
  const otp = document.getElementById('forgot-otp').value;
  const new_password = document.getElementById('forgot-new-password').value;
  if(!otp || !new_password){ toast('OTP aur naya password daalo'); return; }
  const res = await fetch(`${API}/auth/reset-password`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({phone, otp, new_password})
  });
  const data = await res.json();
  if(!res.ok){ toast(data.detail || 'Kuch galat ho gaya'); return; }
  toast('Password changed! Please login now');
  closeForgotPassword();
}

function authHeaders(){ return {'Authorization': `Bearer ${token}`, 'Content-Type':'application/json'}; }

function requireLogin(){
  if(token) return true;
  toast('Please login first!');
  document.getElementById('app-content').classList.add('hidden');
  document.getElementById('auth-panel').classList.remove('hidden');
  return false;
}
function switchTab(name){
  ['orders','inventory','scan','myqr'].forEach(t => {
    document.getElementById(`tab-content-${t}`).classList.toggle('hidden', t !== name);
    document.getElementById(`tab-${t}`).classList.toggle('active', t === name);
  });
  if(name === 'myqr') loadMyShopQR();
}

let myShopQRLoaded = false;
async function loadMyShopQR(){
  if(myShopQRLoaded) return;
  const res = await fetch(`${API}/shop/my-qr`, {headers: authHeaders()});
  if(!res.ok){ toast('QR could not be loaded'); return; }
  const data = await res.json();
  document.getElementById('my-qr-name').innerText = data.shop_name;
  const box = document.getElementById('my-qr-box');
  box.innerHTML = '';
  const img = document.createElement('img');
  img.src = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(data.qr_data)}`;
  img.alt = 'Dukan QR Code';
  img.style.width = '220px';
  img.style.height = '220px';
  box.appendChild(img);
  myShopQRLoaded = true;
}

// ---------------- ORDERS ----------------
async function loadOrders(){
  const res = await fetch(`${API}/shop/orders`, {headers: authHeaders()});
  if(!res.ok) return;
  const orders = await res.json();
  const wrap = document.getElementById('orders-list');
  wrap.innerHTML = orders.filter(o => o.status !== 'completed').map(renderOrderCard).join('') || '<div class="panel">No new orders yet.</div>';
}

function renderOrderCard(so){
  const itemsHtml = so.items.map(i => `
    <div class="item-check-row">
      <span class="name">${i.item_name} × ${i.quantity} <br><span class="hint">₹${i.unit_price}/unit</span></span>
      <button class="avail-btn avail-ok ${i.availability==='available'?'active':''}" onclick="setAvailability(${i.id}, 'available')">✓</button>
      <button class="avail-btn avail-no ${i.availability==='not_available'?'active':''}" onclick="setAvailability(${i.id}, 'not_available')">✕</button>
    </div>`).join('');

  let footer = '';
  if(so.status === 'awaiting_payment'){
    footer = `<div class="hint">Customer is making payment — please wait.</div>`;
  } else if(so.status === 'confirmed'){
    footer = `<div class="hint">Payment: <strong>${so.payment_status}</strong></div>
      <button class="btn-accent" style="margin-top:8px" onclick="markReady(${so.id})">Ready — Items Prepared</button>`;
  } else if(so.status === 'ready'){
    footer = `<div class="hint">Customer is on the way. Order ID: <strong>${so.id}</strong> — confirm from Pickup Verify tab.</div>`;
  }

  return `
    <div class="panel order-card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <strong>${so.customer_name}</strong>
        <span class="status-pill status-${so.status}">${so.status.replace(/_/g,' ')}</span>
      </div>
      <div class="hint">Order ID: ${so.id} · Total: ₹${so.amount.toFixed(2)}</div>
      ${itemsHtml}
      ${footer}
    </div>`;
}

async function setAvailability(shopOrderItemId, availability){
  if(!requireLogin()) return;
  const res = await fetch(`${API}/shop/order-items/${shopOrderItemId}/availability`, {
    method:'PATCH', headers: authHeaders(), body: JSON.stringify({availability})
  });
  if(!res.ok){ toast(await res.text()); return; }
  loadOrders();
}

async function markReady(shopOrderId){
  if(!requireLogin()) return; 
  const res = await fetch(`${API}/shop/orders/${shopOrderId}/ready`, {method:'POST', headers: authHeaders()});
  if(!res.ok){ toast(await res.text()); return; }
  toast('Sent "order ready" to customer!');
  loadOrders();
}

 
// ---------------- PICKUP VERIFICATION ----------------
let html5QrCode = null;

function startScanner(){
  if(!requireLogin()) return;  
  const orderId = document.getElementById('scan-order-id').value;
  if(!orderId){ toast('Enter Order ID first'); return; }
  if(html5QrCode){ html5QrCode.stop(); }
  html5QrCode = new Html5Qrcode("qr-reader");
  html5QrCode.start(
    { facingMode: "environment" }, { fps: 10, qrbox: 220 },
    async (decodedText) => {
      html5QrCode.stop();
      const res = await fetch(`${API}/shop/orders/${orderId}/verify-qr`, {
        method:'POST', headers: authHeaders(), body: JSON.stringify({qr_token: decodedText})
      });
      if(res.ok){ toast('Pickup confirmed! ✅'); loadOrders(); }
      else{ toast('QR did not match: ' + (await res.text())); }
    },
    () => {}
  );
}

async function verifyByCode(){
  if(!requireLogin()) return;
  const code = document.getElementById('code-input').value;
  if(!code || code.length !== 4){ toast('Enter the 4-digit code'); return; }
  const res = await fetch(`${API}/shop/orders/verify-code-only`, {
    method:'POST', headers: authHeaders(), body: JSON.stringify({code})
  });
  if(res.ok){
    toast('Pickup confirm ho gaya! ✅');
    document.getElementById('code-input').value = '';
    loadOrders();
  } else {
    toast('Incorrect code: ' + (await res.text()));
  }
}

function renderCountryList(filter=""){
  const items = document.getElementById('country-list-items');
  const f = filter.toLowerCase();
  const filtered = countries.filter(c => c.name.toLowerCase().includes(f) || c.code.includes(f));
  items.innerHTML = filtered.map(c => `<div onclick="selectCountry('${c.flag}','${c.code}')"><img src="https://flagcdn.com/w20/${c.flag}.png"> ${c.code} ${c.name}</div>`).join('');
}

function toggleCountryList(){
  const list = document.getElementById('country-list');
  if(list.classList.contains('hidden')){
    renderCountryList();
    list.classList.remove('hidden');
    document.getElementById('country-search').value = "";
    document.getElementById('country-search').focus();
  } else {
    list.classList.add('hidden');
  }
}

function selectCountry(flag, code){
  document.getElementById('country-code-btn').innerHTML = `<img src="https://flagcdn.com/w20/${flag}.png"> ${code} ▾`;
  document.getElementById('country-list').classList.add('hidden');
}

function skipToGuest(){
  token = null; myUserId = null;
  document.getElementById('user-badge').innerText = 'Guest User';
  document.getElementById('auth-panel').classList.add('hidden');
  document.getElementById('app-content').classList.remove('hidden');
  loadOrders(); loadCatalogAndInventory();
  toast('Guest mode active!');
}

// ---------------- WEBSOCKET ----------------
function connectWS(){
  const wsUrl = API.replace('http', 'ws') + `/ws?token=${token}`;
  ws = new WebSocket(wsUrl);
  ws.onmessage = (msg) => {
    const {event, data} = JSON.parse(msg.data);
    if(event === 'new_order'){ toast('New order received!'); loadOrders(); }
    else if(event === 'order_completed'){ toast(`Order delivered to ${data.customer_name}`); loadOrders(); }
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
}

function toast(msg){
  const t = document.createElement('div');
  t.className = 'toast'; t.innerText = typeof msg === 'string' ? msg : JSON.stringify(msg);
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

async function loadInventory(){
  const res = await fetch(`${API}/shop/inventory`, {headers: authHeaders()});
  if(!res.ok) return;
  const items = await res.json();
  renderInventoryGrid(items);
}

function renderInventoryGrid(items){
  const wrap = document.getElementById('inventory-list');
  if(!items.length){
    wrap.innerHTML = '<div class="hint">No items added yet.</div>';
    return;
  }
  wrap.innerHTML = items.map(i => `
    <div class="inv-chip" style="position:relative;">
      <span class="inv-price-badge">₹${i.price}</span>
      <button class="inv-remove-x" onclick="deleteInventoryItem(${i.shop_item_id})">✕</button>
      <span class="inv-name">${i.name}</span>
      <button class="inv-edit-btn" onclick="editInventoryItem(${i.shop_item_id}, '${i.name.replace(/'/g,"\\'")}', ${i.price})">Edit</button>
    </div>
  `).join('');
}

async function createItem(){
  if(!requireLogin()) return;
  const name = document.getElementById('new-item-name').value.trim();
  const unit = document.getElementById('new-item-unit').value;
  const price = parseFloat(document.getElementById('new-item-price').value);

  if(!name){ toast('Enter item name'); return; }
  if(!price || price <= 0){ toast('Enter a valid price'); return; }

  if(editingShopItemId){
    const delRes = await fetch(`${API}/shop/inventory/${editingShopItemId}`, {
      method: 'DELETE', headers: authHeaders()
    });
    if(!delRes.ok){ toast('Update nahi hua: ' + (await delRes.text())); return; }
  }

  const itemRes = await fetch(`${API}/shop/items?name=${encodeURIComponent(name)}&unit=${encodeURIComponent(unit)}&category=general`, {
    method: 'POST', headers: authHeaders()
  });
  if(!itemRes.ok){ toast('Error creating item: ' + (await itemRes.text())); return; }
  const item = await itemRes.json();

  const invRes = await fetch(`${API}/shop/inventory`, {
    method: 'POST', headers: authHeaders(),
    body: JSON.stringify({item_id: item.id, price, in_stock: true})
  });
  if(!invRes.ok){ toast('Price could not be saved: ' + (await invRes.text())); return; }

  toast(editingShopItemId ? 'Item update ho gaya!' : 'Item added!');
  document.getElementById('new-item-name').value = '';
  document.getElementById('new-item-price').value = '';
  document.querySelector('.ai-save').innerText = 'Save';
  editingShopItemId = null;
  loadInventory();
}

async function deleteInventoryItem(shopItemId){
  if(!requireLogin()) return;
  const res = await fetch(`${API}/shop/inventory/${shopItemId}`, {
    method: 'DELETE', headers: authHeaders()
  });
  if(!res.ok){ toast('Could not remove: ' + (await res.text())); return; }
  toast('Item removed');
  loadInventory();
}
</script>
